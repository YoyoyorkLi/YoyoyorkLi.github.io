{%- assign post_url = post.url | relative_url -%}
    
<div class="col-lg-6 my-3 wow animated fadeIn" data-wow-delay=".15s">
  
  <a href="{{ post_url }}" class="post card border" style="text-decoration: none; color: inherit; display: block; border-radius: 10px; overflow: hidden;">
    
    <div class="card-body">
      
      <h4 class="card-title" style="line-height: 1.4; font-weight: 600;">{{ post.title }}</h4>
      
      {% if post.journal %}
        <h6 class="mt-3 mb-3" style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888; font-size: 0.85rem;">
          {{ post.journal }}
        </h6>
      {% endif %}

      <div class="mt-3">
        {% for tag in post.tags %}
        <span style="background-color: rgba(150,150,150,0.15); border: 1px solid rgba(150,150,150,0.3); padding: 4px 10px; border-radius: 20px; font-size: 0.75em; margin-right: 5px; display: inline-block; margin-bottom: 5px;">
          {{ tag }}
        </span>
        {% endfor %}
      </div>

    </div>
  </a>
</div>
